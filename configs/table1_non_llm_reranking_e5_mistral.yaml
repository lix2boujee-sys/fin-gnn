# Table 1: Non-LLM Reranking Comparison
# Evidence ranking comparison across retrieval + reranking methods.
# No LLM involved.
#
# Usage:
#   python experiments/table1_non_llm_reranking_comparison.py \
#       --config configs/table1_non_llm_reranking_e5_mistral.yaml

root_dir: "D:/fin-gnn"
data_dir: "FinDER/data"
edgar_dir: "10-k"
output_dir: "outputs/table1_non_llm_reranking"
cache_dir: "cache"

datasets:
  - finder

chunk_size: 512
chunk_overlap: 64

retrieval:
  dense_model: "D:/fin-gnn/cache/models/e5-mistral-7b-instruct"
  # Query instruction for E5-Mistral models
  dense_query_instruction: "Given a financial question, retrieve relevant evidence passages from SEC filings that directly support the answer."
  e5_max_seq_length: 512
  e5_batch_size: 4
  debug_dense: false
  top_k: 50
  hybrid_alpha: 0.5
  bm25_k1: 1.5
  bm25_b: 0.75

cross_encoder:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k_rerank: 100
  batch_size: 32

rerank:
  ppr_alpha: 0.85
  ppr_max_iter: 100
  gnn_model: "sage"
  gnn_hidden: 128
  gnn_layers: 2
  gnn_epochs: 10
  gnn_lr: 0.001
  gnn_dropout: 0.3
  fusion_alpha: 0.3
  fusion_beta: 0.3
  fusion_gamma: 0.4
  fusion_delta: 0.0

constraint:
  enabled: true
  company_match_weight: 1.0
  year_match_weight: 1.0
  metric_match_weight: 0.8
  filing_type_match_weight: 0.5

evaluation:
  recall_k_values: [5, 10]
  metrics:
    - evidence_recall
    - mrr
    - ndcg
