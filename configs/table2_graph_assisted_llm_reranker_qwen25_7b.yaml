# Table 2: Graph-Assisted LLM Reranker
# Tests whether graph-based reranking can pre-filter candidates before LLM
# reranking, reducing token cost while preserving ranking quality.
#
# Usage:
#   python experiments/table2_graph_assisted_llm_reranker.py \
#       --config configs/table2_graph_assisted_llm_reranker_qwen25_7b.yaml

root_dir: "D:/fin-gnn"
data_dir: "FinDER/data"
edgar_dir: "10-k"
output_dir: "outputs/table2_graph_assisted_llm_reranker"
cache_dir: "cache"

datasets:
  - finder

chunk_size: 512
chunk_overlap: 64

retrieval:
  dense_model: "D:/fin-gnn/cache/models/e5-mistral-7b-instruct"
  top_k: 50
  hybrid_alpha: 0.5
  bm25_k1: 1.5
  bm25_b: 0.75

cross_encoder:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k_rerank: 100
  batch_size: 32

rerank:
  ppr_alpha: 0.85
  gnn_model: "rgcn"
  gnn_hidden: 128
  gnn_epochs: 10
  gnn_lr: 0.001
  gnn_dropout: 0.3
  fusion_alpha: 0.3
  fusion_beta: 0.3
  fusion_gamma: 0.4
  fusion_delta: 0.0

llm:
  model: "qwen/qwen-2.5-7b-instruct"
  temperature: 0.0
  max_tokens: 1024

evaluation:
  recall_k_values: [5]
