# FEG-RAG default experiment configuration
# Override any key; missing keys fall back to config.DEFAULTS.

root_dir: "D:/fin-gnn"
data_dir: "FinDER/data"
edgar_dir: "10-k"
output_dir: "outputs"
cache_dir: "cache"

datasets:
  - finder
  # - tatqa
  # - finqa

# Optional. Set to train/dev/test or provide explicit file names to avoid
# accidentally mixing splits when multiple parquet files are present.
data_split:
data_files:

chunk_size: 512
chunk_overlap: 64

# Benchmark corpus must come from source documents under edgar_dir.
# Gold-only corpus is debug-only and must be enabled explicitly.
allow_gold_only_corpus: false
corpus:
  allow_gold_only_corpus: false
  max_doc_files:

retrieval:
  dense_model: "D:/fin-gnn/cache/models/all-MiniLM-L6-v2"
  bge_model: "BAAI/bge-m3"
  splade_model: "naver/splade-v3"
  hf_endpoint:
  revision: "main"
  max_length: 512
  bge_batch_size: 16
  splade_batch_size: 8
  splade_sparsify_threshold: 0.0
  # Query instruction for legacy DenseRetriever/E5-style models
  dense_query_instruction: "Given a financial question, retrieve relevant evidence passages from SEC filings that directly support the answer."
  e5_max_seq_length: 512
  e5_batch_size: 4
  debug_dense: false
  top_k: 50

graph:
  node_types:
    - chunk
    - metric
    - year

rerank:
  gnn_model: "sage"  # sage | rgcn
  ppr_retrieval_weight: 0.5  # weight for retrieval scores in PPR fusion (0=PPR only, 1=retrieval only)

evaluation:
  recall_k_values: [1, 3, 5, 10, 20]
