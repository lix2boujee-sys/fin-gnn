# Table 1: Evidence Retrieval Performance
# Evaluates BM25, Dense, Hybrid, Cross-Encoder, PPR, and Constraint-fused reranking
# No LLM generation needed — retrieval metrics only

root_dir: "."
datasets:
  - finder

chunk_size: 512
chunk_overlap: 64

retrieval:
  bm25_k1: 1.5
  bm25_b: 0.75
  dense_model: "sentence-transformers/all-MiniLM-L6-v2"
  top_k: 50
  hybrid_alpha: 0.5

cross_encoder:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k_rerank: 100
  batch_size: 32

graph:
  use_edge_weights: true

rerank:
  ppr_alpha: 0.85
  fusion_alpha: 0.3
  fusion_beta: 0.4
  fusion_gamma: 0.0
  fusion_delta: 0.3

constraint:
  enabled: true

generation:
  model: "gpt-4o"
  temperature: 0.0
  max_tokens: 1
  top_k_evidence: 0

evaluation:
  recall_k_values: [1, 3, 5, 10, 20]
